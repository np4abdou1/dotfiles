# ################################################################
# Hyprland Config
# ################################################################

# Monitor
monitor=,1920x1080@60,auto,1.5

# Execute at launch
exec-once = waybar
exec-once = dunst
exec-once = hyprpaper
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = hypridle
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP && systemctl --user start xdg-desktop-portal.service

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GTK_THEME,Catppuccin-Mocha-Standard-Sapphire-Dark

# Source some config files
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/window.conf

# General
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(4488ffee)
    col.inactive_border = rgba(224466aa)
    hover_icon_on_border = false
    resize_on_border = false
    allow_tearing = false
    resize_corner = 0
}

# Decoration
decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

# Animations
animations {
    enabled = false
}

# Input
input {
    kb_layout = de
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        scroll_factor = 1.0
    }
    accel_profile = flat
}

# Touchpad device config
device {
    name = synaptics-tm3276-004
    scroll_factor = 0.5
}

# Gestures
gestures {
    workspace_swipe_touch = false
}

# Misc
misc {
    disable_autoreload = false
    enable_swallow = false
    swallow_regex =
    focus_on_activate = false
    mouse_move_enables_dpms = false
    key_press_enables_dpms = false
    always_follow_on_dnd = true
    vrr = 0
}
